    <style>
        /* MAIN CONTAINER */
        body {
            display: flex;
            background: linear-gradient(90deg, #c21e65, #d100d1, #023e7d);
            color: white;
            font-family: 'Syne', sans-serif;
            align-items: center;
            align-content: center;
            justify-content: center;
            
        }

        .container {
            width: 95%;
            max-width: 1000px;
            background-color: rgba(225, 225, 225, 0.15);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            animation: fadeIn .6s ease;
        }

        p {
            background-color: rgba(225, 225, 225, 0.15);

            text-align: center;
            color: #0d47a1;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px aqua,
                0 0 10px aqua,
                0 0 10px aqua,
                0 0 10px aqua;
        }

        /* TABLE */

        .table-box {
            background-color: rgba(225, 225, 225, 0.005);
            height: 100vh;

            overflow-x: auto;
            margin-top: 25px;
        }

        table {
            background-color: rgba(225, 225, 225, 0.005);

            width: 100%;
            height: 100vh;
            border-collapse: collapse;
        }


        td {
            background-color: rgba(225, 225, 225, 0.005);

            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }

        /* ROW EFFECT */

        tr.candidate-row {
            background-color: rgba(225, 225, 225, 0.005);

            cursor: pointer;
            transition: .3s;
        }

        tr.candidate-row:hover {
            box-shadow: 0 0 10px white,
                0 0 5px white,
                0 0 5px white,
                0 0 5px white;
            background-color: rgba(225, 225, 225, 0.15);
        }

        tr.candidate-row.selected {
            background-color: rgba(225, 225, 225, 0.15);
            transform: scale(1.01);
        }

        /* IMAGES */

        table img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            transition: .3s;
        }

        tr:hover img {
            transform: scale(1.1);
        }

        /* BUTTONS */

        .buttons {
            background-color: rgba(225, 225, 225, 0.15);

            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        button {
            background-color: rgba(225, 225, 225, 0.15);

            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        #voteBtn {
            background-color: rgba(225, 225, 225, 0.15);

            background: #ffa000;
            color: white;
            box-shadow: 0 0 10px #e2c695,
                0 0 10px #e2c695,
                0 0 10px #e2c695,
                0 0 10px #e2c695;
        }

        #submitBtn {
            background-color: rgba(225, 225, 225, 0.15);

            background: #1976d2;
            color: white;
            box-shadow: 0 0 10px #7ca3de,
                0 0 10px #7ca3de,
                0 0 10px #7ca3de,
                0 0 10px #7ca3de;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: .9;
        }

        button:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        /* MESSAGE */

        #message {
            background-color: rgba(225, 225, 225, 0.15);

            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }

        .info {
            color: orange;
        }

        /* ANIMATION */

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
