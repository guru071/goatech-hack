<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <style>
        body {
            background: linear-gradient(90deg, #c21e65, #d100d1, #023e7d);
            color: white;
            font-family: 'Syne', sans-serif;
            margin: 20px; /* Added some margin so headers don't hug the edge */
        }

        #question {
            box-shadow:
                0 0 5px rgb(79, 241, 79),
                0 0 5px rgb(79, 241, 79),
                0 0 5px rgb(79, 241, 79),
                0 0 5px rgb(79, 241, 79);
            margin-top: 50px;
            width: 700px;
            height: 150px;
            background-color: rgba(225, 225, 225, 0.15);
            font-size: 24px;
            font-weight: 600;
            border-radius: 50px;
            margin-bottom: 20px;
            display: flex; /* Centers text vertically and horizontally */
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            text-align: center;
        }

        button {
            box-shadow:
                0 0 5px white,
                0 0 5px white,
                0 0 5px white,
                0 0 5px white;
            width: 300px;
            height: 50px;
            background-color: rgba(225, 225, 225, 0.15);
            color: white; /* Ensures text is visible */
            font-size: 18px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95); /* Little click animation */
        }
    </style>
</head>

<body>
    <h3 id="display-subject">Subject : Loading...</h3>
    <h3>QUESTION NO. <span id="display-qno">0</span></h3>
    <h3 id="display-type">Type : Loading...</h3>
    
    <center>
        <div id="question">Fetching questions...</div>
        <div id="buttons">
            <button id="btn-a" onclick="checkAnswer('a')"></button><br>
            <button id="btn-b" onclick="checkAnswer('b')"></button><br>
            <button id="btn-c" onclick="checkAnswer('c')"></button><br>
            <button id="btn-d" onclick="checkAnswer('d')"></button><br>
        </div>
    </center>

    <script src="../js/quiz_handle.js"></script>
</body>

</html>
