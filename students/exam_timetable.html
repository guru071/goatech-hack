<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOATECH – Exam Timetable</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#020617;
    --surface:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);
    --cyan:#13bece;
    --text:#e2e8f0;
    --muted:#64748b;
}

body {
    margin:0;
    font-family:'DM Sans',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* Topbar */
.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 30px;
    border-bottom:1px solid var(--border);
}

.title {
    font-family:'Syne',sans-serif;
    font-size:20px;
    font-weight:700;
}

.back-btn {
    padding:8px 16px;
    border-radius:8px;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text);
    cursor:pointer;
}

/* Container */
.container {
    padding:30px;
}

/* Card */
.card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:25px;
}

/* Table */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th, td {
    padding:14px;
    text-align:left;
    border-bottom:1px solid var(--border);
}

th {
    color:var(--cyan);
    font-weight:600;
    font-size:14px;
}

td {
    font-size:14px;
}

tr:hover {
    background:rgba(255,255,255,0.03);
}

/* Highlight today */
.today {
    background:rgba(19,190,206,0.15);
    border-left:4px solid var(--cyan);
}

/* Responsive */
@media(max-width:768px){
    .container{
        padding:20px;
    }
    th, td{
        font-size:12px;
    }
}
</style>

</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="title">📅 Semester Exam Timetable – May 2025</div>
    <button class="back-btn" onclick="goBack()">← Back</button>
</div>

<!-- Content -->
<div class="container">
    <div class="card">

        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Subject</th>
                    <th>Code</th>
                    <th>Time</th>
                    <th>Hall</th>
                </tr>
            </thead>

            <tbody id="examTable"></tbody>
        </table>

    </div>
</div>

<script>

// Sample Exam Data
const exams = [
    { date:"2025-05-05", subject:"Data Structures", code:"CS301", time:"10:00 AM – 1:00 PM", hall:"Hall A" },
    { date:"2025-05-08", subject:"Computer Networks", code:"CS302", time:"10:00 AM – 1:00 PM", hall:"Hall B" },
    { date:"2025-05-12", subject:"DBMS", code:"CS303", time:"10:00 AM – 1:00 PM", hall:"Hall C" },
    { date:"2025-05-16", subject:"Operating Systems", code:"CS304", time:"10:00 AM – 1:00 PM", hall:"Hall A" },
    { date:"2025-05-20", subject:"Maths IV", code:"MA401", time:"10:00 AM – 1:00 PM", hall:"Hall D" }
];

const table = document.getElementById("examTable");
const today = new Date().toISOString().split("T")[0];

// Render Table
exams.forEach(exam => {
    const isToday = exam.date === today;

    table.innerHTML += `
    <tr class="${isToday ? 'today' : ''}">
        <td>${exam.date}</td>
        <td>${exam.subject}</td>
        <td>${exam.code}</td>
        <td>${exam.time}</td>
        <td>${exam.hall}</td>
    </tr>`;
});

// Back Button
function goBack(){
    window.location.href = "student_dashboard.html";
}

</script>

</body>
</html>
