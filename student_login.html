<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            text-align: center;

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        button {
            width: 95%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 12px rgb(19, 190, 206);
            transform: scale(1.05);
        }

        .error {
            color: red;
            font-size: 14px;
            margin-top: 10px;
        }

        
    </style>

    <title>Student Login</title>
</head>

<body>

    <div class="container">
        <h2> Student Login</h2>

        <input type="text" id="enroll" placeholder="Enter Enrollment Number">
        <input type="date" id="dob">

        <button onclick="login()">Login</button>

        <div class="error" id="errorMsg"></div>
    </div>

 

    <script>
        // Dummy student database (for prototype)

async function login() {
    const enroll = document.getElementById("enroll").value;
    const dob = document.getElementById("dob").value;
    const errorMsg = document.getElementById("errorMsg");

    if (!enroll || !dob) {
        errorMsg.textContent = "Please fill all fields";
        return;
    }

    try {
        // Send data to our Node.js server
        const response = await fetch('http://localhost:3000/login.html', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enroll, dob })
        });

        const result = await response.json();

        if (result.success) {
            sessionStorage.setItem("studentLoggedIn", "true");
            sessionStorage.setItem("enroll", enroll);
            window.location.href = "../students/student_dashboard.html";
        } else {
            errorMsg.textContent = result.message;
        }
    } catch (err) {
        errorMsg.textContent = "Server is not running!";
    }
}
    </script>

</body>

</html>
